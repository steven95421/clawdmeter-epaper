; PlatformIO project for Clawdmeter-style Claude usage dashboard
; Target: Waveshare ESP32-S3-EPaper-1.54G (200x200 BWR, SSD1681)
;
; NOTE: pin assignments below are a best-guess for Waveshare's ESP32-S3
; e-paper integrated modules. CONFIRM against your board's schematic
; before first flash — wrong pins can hang the boot or leave display blank.

[env:waveshare-esp32s3-epaper-154g]
; Pin to 6.5.0 — newer 6.7+ pulls tool-esptoolpy-2.4110x which is missing
; from some Contabo mirrors (causes "403" loop during first build).
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed = 115200

board_build.flash_mode = qio
board_build.psram = enabled
board_build.partitions = default.csv
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=2
    ; --- Display pins (verified against Waveshare wiki ESP32-S3-ePaper-1.54G) ---
    -DEPD_PWR=6        ; EPD3V3_EN — must be driven HIGH before display init
    -DEPD_BUSY=8
    -DEPD_RST=9
    -DEPD_DC=10
    -DEPD_CS=11
    -DEPD_SCK=12       ; EPD_SCLK
    -DEPD_MOSI=13      ; EPD_SDI

lib_deps =
    h2zero/NimBLE-Arduino@^1.4.2
    bblanchon/ArduinoJson@^7.1.0
    adafruit/Adafruit GFX Library@^1.11.10
